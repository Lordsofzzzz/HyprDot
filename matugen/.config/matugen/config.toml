[config]

[templates.quickshell]
input_path  = "~/.config/matugen/templates/quickshell.qml"
output_path = "~/.config/quickshell/Colors.qml"

[templates.alacritty]
input_path  = "~/.config/matugen/templates/alacritty.toml"
output_path = "~/.config/alacritty/alacritty.toml"

[templates.gtk3]
input_path  = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook   = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'

[templates.gtk4]
input_path  = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.hyprland]
input_path  = "~/.config/matugen/templates/hyprland-colors.lua"
output_path = "~/.config/hypr/hyprland-colors.lua"
